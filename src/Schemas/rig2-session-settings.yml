%YAML 1.1
---
# yaml-language-server: $schema=data-schema.json

metadata:
  animalId: plimbo
  rootPath: test
  minimumSampleTime: 0.05
  loggingRootPath: C:\temp
  rewardTime: 0.015
  initialSequence: Schemas/odourdiscrimination-stage3.yml
  eegRecordingEnabled: False
  maximumRewardsAvailable: 200

shortcutKeys:
  endSessionKey: Ctrl+2
  startOlfactometerPurgeKey: Shift+2
  startCamera: Alt+2

hardwarePorts:
  behaviorBoard: COM4
  olfactometer0: COM8
  olfactometer1: COM9

cameraProperties:
  cameraId: 24282622
  frameRate: 60
  exposure: 15000
  gain: 10
  threshold: 3
  roiSourcePoints:
    points:
      - x: 250
        y: 160
      - x: 250
        y: 780
      - x: 350
        y: 780
      - x: 350
        y: 160

olfactometerCommands:
  - {name: Default, valvesOpenO0: [], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 0, 400], targetFlowO1: [0, 0, 0, 100, 400]}
  - {name: Zero, valvesOpenO0: [], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 0, 1], targetFlowO1: [0, 0, 0, 0, 1]}
  - {name: Purge, valvesOpenO0: [], valvesOpenO1: [3], endValvesOpenO0: [], endValvesOpenO1: [0], targetFlowO0: [0, 0, 0, 0, 400], targetFlowO1: [0, 0, 0, 100, 400]}
  - {name: OdorA, valvesOpenO0: [0], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [100, 0, 0, 0, 253], targetFlowO1: [0, 0, 0, 0, 400]}
  - {name: OdorB, valvesOpenO0: [], valvesOpenO1: [0], endValvesOpenO0: [0], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 0, 400], targetFlowO1: [100, 0, 0, 0, 990]}
  - {name: OdorC, valvesOpenO0: [2], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [0, 0, 100, 0, 260], targetFlowO1: [0, 0, 0, 0, 400]}
  - {name: OdorD, valvesOpenO0: [3], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 100, 263], targetFlowO1: [0, 0, 0, 0, 400]}
  - {name: OdorE, valvesOpenO0: [1], valvesOpenO1: [], endValvesOpenO0: [], endValvesOpenO1: [], targetFlowO0: [0, 100, 0, 0, 263], targetFlowO1: [0, 0, 0, 0, 400]}
  - {name: OdorF, valvesOpenO0: [], valvesOpenO1: [1], endValvesOpenO0: [0], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 0, 400], targetFlowO1: [0, 100, 0, 0, 1000]}
  - {name: OdorG, valvesOpenO0: [], valvesOpenO1: [2], endValvesOpenO0: [0], endValvesOpenO1: [], targetFlowO0: [0, 0, 0, 0, 400], targetFlowO1: [0, 0, 100, 0, 1000]}